name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build balanced-ternary translator plugin
        run: cargo build -p btern_translator --release --target wasm32-unknown-unknown

      - name: Copy translator plugin into examples
        run: cp target/wasm32-unknown-unknown/release/btern_translator.wasm examples/btern_translator.wasm

      - name: Build Surfer WebAssembly app
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/"
        working-directory: surfer

      - name: Copy translator and test files into dist for download
        run: |
          cp examples/btern_translator.wasm surfer/dist/btern_translator.wasm
          cp examples/tvhdl_surfer_test.ghw surfer/dist/tvhdl_surfer_test.ghw

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: surfer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
